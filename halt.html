<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship Matching | Waitlist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="hero-container">
        

        <section class="content">
            <h1 class="headline">
                Not every intern is <br>
                <span class="highlight-text">built the same.</span>
            </h1>

            <div class="subheadline-container">
                <p class="main-sub">
                    Here's what that means for you.
                </p>

                <div class="type-preview-row">
                    <div class="type-chip">
                        <span class="chip-icon">⚡</span>
                        <span class="chip-label">Type A</span>
                        <span class="chip-sub">Skilled</span>
                    </div>
                    <div class="type-chip">
                        <span class="chip-icon">🌱</span>
                        <span class="chip-label">Type B</span>
                        <span class="chip-sub">Developing</span>
                    </div>
                    <div class="type-chip">
                        <span class="chip-icon">🔀</span>
                        <span class="chip-label">Type C</span>
                        <span class="chip-sub">Alternative</span>
                    </div>
                </div>

                <p class="secondary-sub">
                    Each type has different skills, timelines, and mentorship needs.<br>
                    Pick the wrong one for your capacity and you'll both lose.<br>
                    Understand all three first.
                </p>
            </div>

            <a href="options.html"><button class="cta-button">
                Understand the types <span class="arrow">→</span>
            </button></a>

        </section>
    </main>

</body>
</html>
